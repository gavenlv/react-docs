<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07 - 按钮组件特殊化</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin: 5px; transition: all 0.3s; }
    .btn-primary { background: #2196f3; color: white; }
    .btn-secondary { background: #9e9e9e; color: white; }
    .btn-danger { background: #f44336; color: white; }
    .btn-success { background: #4caf50; color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // 通用按钮组件
    function Button({ variant = 'primary', children, ...props }) {
      const className = `btn btn-${variant}`;
      return <button className={className} {...props}>{children}</button>;
    }

    function App() {
      return (
        <div>
          <h1>组件特殊化（Specialization）</h1>
          
          <div className="demo">
            <h3>使用通用按钮组件</h3>
            <Button variant="primary">主要按钮</Button>
            <Button variant="secondary">次要按钮</Button>
            <Button variant="danger">危险操作</Button>
            <Button variant="success">成功</Button>
          </div>
          
          <div className="demo">
            <h3>带点击事件</h3>
            <Button variant="primary" onClick={() => alert('点击了主要按钮!')}>
              点击我
            </Button>
            <Button variant="danger" onClick={() => alert('危险操作!')}>
              删除
            </Button>
          </div>
          
          <div className="demo" style={{background: '#e8f5e9', borderLeft: '4px solid #4caf50'}}>
            <h3>💡 组件特殊化模式</h3>
            <p>通过 props 参数化组件，实现不同"变体"的特殊化使用。</p>
            <p>这是一种常见的组件设计模式，可以创建可复用且灵活的组件。</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
