<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12 - React.memo 优化渲染</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .log-box { background: #263238; color: #aed581; padding: 15px; border-radius: 8px; font-family: monospace; max-height: 150px; overflow-y: auto; margin-top: 10px; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #37474f; }
    button { padding: 10px 20px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; background: #2196f3; color: white; }
    button:hover { background: #1976d2; }
    .without-memo { background: #ffebee; border-left: 4px solid #f44336; }
    .with-memo { background: #e8f5e9; border-left: 4px solid #4caf50; }
    h4 { margin: 15px 0 10px 0; color: #666; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // 不使用 React.memo 的组件
    function ChildWithoutMemo({ name }) {
      React.useEffect(() => {
        const logs = document.getElementById('logs-without');
        if (logs) {
          const entry = document.createElement('div');
          entry.className = 'log-entry';
          entry.textContent = `ChildWithoutMemo 重新渲染了!`;
          logs.appendChild(entry);
          logs.scrollTop = logs.scrollHeight;
        }
      });
      return <p style={{color: '#f44336'}}>普通 Child - name: {name}</p>;
    }

    // 使用 React.memo 的组件
    const MemoizedChild = React.memo(function ChildWithMemo({ name }) {
      React.useEffect(() => {
        const logs = document.getElementById('logs-with');
        if (logs) {
          const entry = document.createElement('div');
          entry.className = 'log-entry';
          entry.textContent = `MemoizedChild 重新渲染了!`;
          logs.appendChild(entry);
          logs.scrollTop = logs.scrollHeight;
        }
      });
      return <p style={{color: '#4caf50'}}>Memoized Child - name: {name}</p>;
    });

    // 父组件 - 不使用 memo
    function ParentWithoutMemo() {
      const [count, setCount] = React.useState(0);
      
      return (
        <div className="demo without-memo">
          <h4>❌ 不使用 React.memo</h4>
          <button onClick={() => setCount(c => c + 1)}>计数: {count}</button>
          {/* name="小明" 永远不变，但 Child 仍然会重新渲染 */}
          <ChildWithoutMemo name="小明" />
          <div id="logs-without" className="log-box"></div>
        </div>
      );
    }

    // 父组件 - 使用 memo
    function ParentWithMemo() {
      const [count, setCount] = React.useState(0);
      
      return (
        <div className="demo with-memo">
          <h4>✅ 使用 React.memo</h4>
          <button onClick={() => setCount(c => c + 1)}>计数: {count}</button>
          {/* name="小明" 永远不变，MemoizedChild 不会重新渲染 */}
          <MemoizedChild name="小明" />
          <div id="logs-with" className="log-box"></div>
        </div>
      );
    }

    function App() {
      return (
        <div>
          <h1>React.memo 优化渲染</h1>
          
          <div className="demo" style={{background: '#e3f2fd', borderLeft: '4px solid #2196f3'}}>
            <h3>💡 React.memo 的作用</h3>
            <p><strong>React.memo</strong> 会对 props 进行浅比较，只有 props 变了才会重新渲染。</p>
            <p>点击两个示例的按钮，观察日志输出的区别。</p>
          </div>
          
          <ParentWithoutMemo />
          <ParentWithMemo />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
