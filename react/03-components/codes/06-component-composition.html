<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06 - 组件组合 (Composition)</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; margin: 10px 0; }
    .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; font-weight: bold; }
    .card-content { padding: 20px; }
    .user-info { margin: 10px 0; }
    button { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #5568d3; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // 包含关系（Composition）- 使用 children
    function Card({ children, title }) {
      return (
        <div className="card">
          <div className="card-header">{title}</div>
          <div className="card-content">
            {children}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div>
          <h1>组件组合 (Composition)</h1>
          
          <Card title="用户信息">
            <div className="user-info">
              <p>姓名：张三</p>
              <p>邮箱：zhangsan@example.com</p>
              <button>编辑</button>
            </div>
          </Card>
          
          <Card title="产品信息">
            <div className="user-info">
              <p>产品名称：React 入门教程</p>
              <p>价格：¥99.00</p>
              <button>立即购买</button>
            </div>
          </Card>
          
          <Card title="提示信息">
            <p>这里是使用 children 属性实现的内容组合。</p>
            <p>children 可以是任何 React 可渲染的内容！</p>
          </Card>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
