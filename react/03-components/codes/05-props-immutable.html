<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05 - Props 只读性</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .wrong { border-left: 4px solid #f44336; background: #ffebee; }
    .correct { border-left: 4px solid #4caf50; background: #e8f5e9; }
    .counter { font-size: 48px; text-align: center; padding: 20px; background: #e3f2fd; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ❌ 错误：尝试修改 props
    // React 不会真正阻止你，但这是反模式！
    function CounterWrong({ count }) {
      // ⚠️ 这样做不会生效，因为 props 是只读的
      // count++;  // 不应该这样做！
      return (
        <div className="counter">
          <p>当前计数（错误方式演示）</p>
          <p style={{color: '#f44336'}}>尝试修改 props 会导致不可预测的行为</p>
        </div>
      );
    }

    // ✅ 正确：只读取 props
    function Counter({ count }) {
      return (
        <div className="counter">
          <p>当前计数</p>
          <p style={{color: '#4caf50', fontSize: '72px', margin: '10px 0'}}>{count}</p>
        </div>
      );
    }

    function App() {
      const [count, setCount] = React.useState(0);
      
      return (
        <div>
          <h1>Props 只读性原则</h1>
          
          <div className="demo correct">
            <h3>✅ 正确：只读取 props</h3>
            <Counter count={count} />
            <button onClick={() => setCount(c => c + 1)} style={{padding: '10px 20px', fontSize: '16px', cursor: 'pointer'}}>
              增加计数
            </button>
          </div>
          
          <div className="demo wrong">
            <h3>❌ 错误：修改 props</h3>
            <p>Props 是从父组件传入的，组件不应该修改自己的 props。</p>
            <p>如果需要可变状态，应该使用 <strong>State</strong>！</p>
          </div>
          
          <div className="demo" style={{background: '#fff3e0', borderLeft: '4px solid #ff9800'}}>
            <h3>💡 记住</h3>
            <p><strong>Props 用于接收数据，State 用于管理可变状态。</strong></p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
