<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11 - 组件重新渲染机制</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .log-box { background: #263238; color: #aed581; padding: 15px; border-radius: 8px; font-family: monospace; max-height: 200px; overflow-y: auto; margin-top: 10px; }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #37474f; }
    button { padding: 10px 20px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; background: #2196f3; color: white; }
    button:hover { background: #1976d2; }
    .counter { font-size: 24px; text-align: center; padding: 20px; background: #e3f2fd; border-radius: 8px; margin: 10px 0; }
    input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function Child({ name }) {
      React.useEffect(() => {
        // 记录重新渲染
        const logs = document.getElementById('child-logs');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = `Child 重新渲染了! (name: ${name})`;
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
      });
      return <p style={{color: '#2196f3', fontWeight: 'bold'}}>我是 Child，name = {name}</p>;
    }

    function Parent() {
      const [parentCount, setParentCount] = React.useState(0);
      const [other, setOther] = React.useState('');
      
      React.useEffect(() => {
        const logs = document.getElementById('parent-logs');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = `Parent 重新渲染了! (count: ${parentCount})`;
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
      });

      return (
        <div className="demo">
          <h3>Parent 组件</h3>
          <button onClick={() => setParentCount(c => c + 1)}>
            父组件计数: {parentCount}
          </button>
          <input 
            placeholder="输入其他内容..." 
            value={other}
            onChange={e => setOther(e.target.value)}
          />
          <p style={{color: '#666', fontSize: '14px'}}>
            ⚠️ 注意：即使 other 变化和 Child 完全无关，Child 也会因为父组件渲染而重新渲染
          </p>
          <Child name="小明" />
          <div id="parent-logs" className="log-box"></div>
        </div>
      );
    }

    function App() {
      return (
        <div>
          <h1>组件重新渲染机制</h1>
          
          <div className="demo" style={{background: '#fff3e0', borderLeft: '4px solid #ff9800'}}>
            <h3>触发重新渲染的条件</h3>
            <ul>
              <li>1. 自身的 State 发生变化 (setState / dispatch)</li>
              <li>2. 父组件重新渲染（不管 props 变没变！）</li>
              <li>3. Context 的值发生变化 (useContext)</li>
              <li>4. 使用了 memo 但 props 变了 (React.memo 浅比较失败)</li>
            </ul>
          </div>
          
          <Parent />
          
          <div className="demo" style={{background: '#e8f5e9', borderLeft: '4px solid #4caf50'}}>
            <h3>💡 解决思路</h3>
            <p>使用 <strong>React.memo</strong> 可以避免子组件不必要的重新渲染。</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
