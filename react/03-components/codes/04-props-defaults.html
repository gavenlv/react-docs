<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 - Props 默认值</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .card { background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #2196f3; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // 方法一：默认参数（推荐）
    function Greeting({ name = 'Guest', message = 'Welcome!' }) {
      return (
        <div className="card">
          <h3>{message}</h3>
          <p>Hello, {name}!</p>
        </div>
      );
    }

    // 方法二：defaultProps（已废弃，不推荐）
    function GreetingOld({ name }) {
      return <p>Hello, {name}!</p>;
    }
    GreetingOld.defaultProps = {
      name: 'Guest'
    };

    function App() {
      return (
        <div>
          <h1>Props 默认值</h1>
          
          <div className="demo">
            <h3>方式一：默认参数（推荐）</h3>
            <Greeting name="Alice" message="Welcome!" />
            <Greeting />  {/* 使用默认值 */}
            <Greeting name="Bob" />  {/* 只覆盖 name */}
          </div>
          
          <div className="demo">
            <h3>方式二：defaultProps（已废弃）</h3>
            <GreetingOld />
          </div>
          
          <div className="demo" style={{background: '#fff3e0', borderLeft: '4px solid #ff9800'}}>
            <h3>⚠️ 注意</h3>
            <p>defaultProps 已被废弃，推荐使用默认参数或 TypeScript 的类型定义。</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
