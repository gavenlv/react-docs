<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02 - 组件命名规则</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
    .demo { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .correct { border-left: 4px solid #4caf50; }
    .wrong { border-left: 4px solid #f44336; }
    .note { background: #fff3cd; padding: 10px; border-radius: 4px; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ✅ 正确：首字母大写（PascalCase）
    function UserCard() {
      return <div className="user-card">用户卡片组件</div>;
    }
    
    const UserProfile = () => <div>用户资料组件</div>;
    
    // ❌ 错误：首字母小写会被识别为 HTML 标签
    // function userCard() {}  // React 会认为这是自定义 HTML 标签

    function App() {
      return (
        <div>
          <h1>组件命名规则</h1>
          
          <div className="demo correct">
            <h3>✅ 正确：首字母大写（PascalCase）</h3>
            <UserCard />
            <UserProfile />
            <pre>{`function UserCard() {}
const UserProfile = () => {}`}</pre>
          </div>
          
          <div className="demo wrong">
            <h3>❌ 错误：首字母小写</h3>
            <p>首字母小写会被 React 识别为 HTML 标签，而不是组件。</p>
            <pre>{`// ❌ 错误示例
function userCard() {}
// React 会认为这是自定义 HTML 标签 <userCard />`}</pre>
          </div>
          
          <div className="note">
            <strong>💡 记住：</strong>React 组件必须以大写字母开头！
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
