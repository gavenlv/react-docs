<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 简介 - 第一个网页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      padding: 40px 20px;
      background: #f5f5f5;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #e44d26; margin-bottom: 20px; }
    h2 { color: #f16529; margin: 20px 0 10px; }
    p { margin: 10px 0; color: #333; }
    .info-box {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin: 20px 0;
    }
    .tag-demo {
      background: #e8f4f8;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    code {
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }
    .logo {
      font-size: 48px;
      text-align: center;
      margin: 30px 0;
    }
    .logo span { color: #e44d26; }
    .logo span:last-child { color: #f16529; }
  </style>
</head>
<body>
  <div class="logo">
    <span>&lt;</span><span>HTML</span><span>/&gt;</span>
  </div>
  
  <h1>欢迎来到 HTML 世界！</h1>
  
  <div class="info-box">
    <h2>这是我的第一个网页</h2>
    <p>HTML 是构建网页的基础语言。通过学习 HTML，你可以创建自己的网页！</p>
  </div>
  
  <h2>HTML 能做什么？</h2>
  <div class="tag-demo">
    <p><strong>加粗文本</strong> 使用 &lt;strong&gt; 标签</p>
    <p><em>斜体文本</em> 使用 &lt;em&gt; 标签</p>
    <p><code>代码文本</code> 使用 &lt;code&gt; 标签</p>
  </div>
  
  <h2>学习路线</h2>
  <div class="info-box">
    <p>1. 学习 HTML 基础标签</p>
    <p>2. 学习 CSS 样式</p>
    <p>3. 学习 JavaScript 交互</p>
    <p>4. 实践项目开发</p>
  </div>
  
  <hr>
  <p style="text-align: center; color: #888;">
    用 ❤️ 创建 | 开始你的 HTML 学习之旅
  </p>
</body>
</html>
