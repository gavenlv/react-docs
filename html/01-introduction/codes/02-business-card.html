<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人名片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      color: white;
    }
    h1 { color: #333; margin-bottom: 5px; }
    .title { color: #667eea; margin-bottom: 20px; }
    .bio { color: #666; margin-bottom: 25px; line-height: 1.6; }
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
    }
    .skill {
      background: #f0f0f0;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
    }
    .contact {
      border-top: 1px solid #eee;
      padding-top: 20px;
    }
    .contact p { color: #666; margin: 5px 0; font-size: 14px; }
    .contact strong { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>张三</h1>
    <p class="title">前端开发工程师</p>
    <p class="bio">热爱编程，专注于前端技术。致力于创建美观、易用的网页应用。</p>
    
    <div class="skills">
      <span class="skill">HTML</span>
      <span class="skill">CSS</span>
      <span class="skill">JavaScript</span>
      <span class="skill">Vue</span>
      <span class="skill">React</span>
    </div>
    
    <div class="contact">
      <p><strong>邮箱：</strong>zhangsan@example.com</p>
      <p><strong>电话：</strong>138-0000-0000</p>
      <p><strong>地址：</strong>北京市朝阳区</p>
    </div>
  </div>
</body>
</html>
