<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 动画示例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 40px;
    }

    .demo-section {
      margin: 40px auto;
      max-width: 1000px;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .demo-title {
      font-size: 24px;
      color: #3498db;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #3498db;
    }

    .demo-description {
      background: #e7f3ff;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      border-left: 4px solid #3498db;
    }

    /* 基础动画 */
    .animation-box {
      width: 100px;
      height: 100px;
      background: #3498db;
      border-radius: 8px;
      margin: 20px;
    }

    /* 关键帧动画 */
    @keyframes slide {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(300px);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-100px);
      }
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes scale {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.5);
      }
    }

    @keyframes fade {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }

    @keyframes color-change {
      0% {
        background: #e74c3c;
      }
      25% {
        background: #f39c12;
      }
      50% {
        background: #2ecc71;
      }
      75% {
        background: #3498db;
      }
      100% {
        background: #e74c3c;
      }
    }

    @keyframes multi-step {
      0% {
        transform: translateX(0) rotate(0deg);
        background: #3498db;
        border-radius: 8px;
      }
      25% {
        transform: translateX(100px) rotate(90deg);
        background: #e74c3c;
        border-radius: 50%;
      }
      50% {
        transform: translateX(200px) rotate(180deg);
        background: #2ecc71;
        border-radius: 8px;
      }
      75% {
        transform: translateX(100px) rotate(270deg);
        background: #f39c12;
        border-radius: 50%;
      }
      100% {
        transform: translateX(0) rotate(360deg);
        background: #3498db;
        border-radius: 8px;
      }
    }

    /* 应用动画 */
    .slide-animation {
      animation: slide 2s ease-in-out infinite alternate;
    }

    .bounce-animation {
      animation: bounce 1s ease-in-out infinite;
    }

    .rotate-animation {
      animation: rotate 2s linear infinite;
    }

    .scale-animation {
      animation: scale 2s ease-in-out infinite;
    }

    .fade-animation {
      animation: fade 2s ease-in-out infinite;
    }

    .color-animation {
      animation: color-change 4s linear infinite;
    }

    .multi-animation {
      animation: multi-step 4s ease-in-out infinite;
    }

    /* 动画属性演示 */
    .animation-properties {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .property-box {
      background: #ecf0f1;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .property-box .animation-box {
      margin: 10px auto;
    }

    /* 动画填充模式 */
    .fill-forwards {
      animation: slide 2s ease-in-out forwards;
    }

    .fill-backwards {
      animation: slide 2s ease-in-out 2s backwards;
    }

    .fill-both {
      animation: slide 2s ease-in-out 2s both;
    }

    /* 暂停动画 */
    .animation-paused {
      animation: rotate 2s linear infinite;
      animation-play-state: paused;
    }

    .animation-paused:hover {
      animation-play-state: running;
    }

    /* 加载动画 */
    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: rotate 1s linear infinite;
      margin: 20px auto;
    }

    /* 脉冲动画 */
    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7);
      }
      70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 20px rgba(52, 152, 219, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(52, 152, 219, 0);
      }
    }

    .pulse-button {
      background: #3498db;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    /* 文字动画 */
    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }

    .typing-effect {
      overflow: hidden;
      border-right: 3px solid #3498db;
      white-space: nowrap;
      animation: typing 3.5s steps(40, end), blink 0.75s step-end infinite;
      font-family: monospace;
      font-size: 20px;
    }

    .label {
      display: inline-block;
      background: #3498db;
      color: white;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>CSS 动画示例</h1>

  <div class="demo-section">
    <h2 class="demo-title">1. 基础动画效果</h2>
    <div class="demo-description">
      使用 <strong>@keyframes</strong> 定义动画关键帧
    </div>

    <div class="animation-properties">
      <div class="property-box">
        <span class="label">滑动</span>
        <div class="animation-box slide-animation"></div>
      </div>

      <div class="property-box">
        <span class="label">弹跳</span>
        <div class="animation-box bounce-animation"></div>
      </div>

      <div class="property-box">
        <span class="label">旋转</span>
        <div class="animation-box rotate-animation"></div>
      </div>

      <div class="property-box">
        <span class="label">缩放</span>
        <div class="animation-box scale-animation"></div>
      </div>

      <div class="property-box">
        <span class="label">淡入淡出</span>
        <div class="animation-box fade-animation"></div>
      </div>

      <div class="property-box">
        <span class="label">颜色变化</span>
        <div class="animation-box color-animation"></div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">2. 多步动画</h2>
    <div class="demo-description">
      在动画的不同阶段设置不同的样式
    </div>
    <div style="text-align: center; padding: 40px 0;">
      <div class="animation-box multi-animation" style="display: inline-block;"></div>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">3. animation-fill-mode</h2>
    <div class="demo-description">
      控制动画执行前后的样式
    </div>

    <div class="animation-properties">
      <div class="property-box">
        <span class="label">forwards</span>
        <p style="font-size: 12px; color: #666; margin: 10px 0;">保持最后一帧</p>
        <div class="animation-box fill-forwards"></div>
      </div>

      <div class="property-box">
        <span class="label">backwards</span>
        <p style="font-size: 12px; color: #666; margin: 10px 0;">应用初始帧</p>
        <div class="animation-box fill-backwards"></div>
      </div>

      <div class="property-box">
        <span class="label">both</span>
        <p style="font-size: 12px; color: #666; margin: 10px 0;">同时应用两者</p>
        <div class="animation-box fill-both"></div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">4. animation-play-state</h2>
    <div class="demo-description">
      鼠标悬停时启动动画
    </div>
    <div style="text-align: center; padding: 40px 0;">
      <div class="animation-box animation-paused" style="display: inline-block;"></div>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">5. 实际应用：加载动画</h2>
    <div class="loader"></div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">6. 实际应用：脉冲按钮</h2>
    <div style="text-align: center; padding: 40px 0;">
      <button class="pulse-button">脉冲按钮</button>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">7. 实际应用：打字效果</h2>
    <div style="padding: 20px 0;">
      <div class="typing-effect">这是一段打字机效果的文字...</div>
    </div>
  </div>
</body>
</html>
