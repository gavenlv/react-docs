<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数组演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      background: #f5f5f5;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
    .demo-section {
      margin: 30px 0;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .demo-title {
      font-size: 24px;
      color: #f7df1e;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f7df1e;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s;
      background: #f7df1e;
      color: #000;
    }
    button:hover { background: #e5ce1b; }
    .output {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .array-visual {
      display: flex;
      gap: 5px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .array-item {
      background: #667eea;
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      font-weight: bold;
      min-width: 50px;
      text-align: center;
    }
    .array-item.highlight {
      background: #e74c3c;
      transform: scale(1.1);
    }
    .method-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin: 20px 0;
    }
    .method-btn {
      padding: 15px;
      text-align: center;
      background: #f8f9fa;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .method-btn:hover {
      border-color: #f7df1e;
      background: #fffbe6;
    }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; font-weight: 600; }
    .cart-total {
      font-size: 24px;
      font-weight: bold;
      text-align: right;
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 8px;
    }
    .btn-add { background: #27ae60; color: white; }
    .btn-remove { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; }
    .btn-qty { padding: 5px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>数组演示</h1>
  
  <div class="demo-section">
    <h2 class="demo-title">数组可视化</h2>
    <div class="array-visual" id="arrayVisual"></div>
    <button onclick="randomArray()">随机生成</button>
    <button onclick="sortArray()">排序</button>
    <button onclick="reverseArray()">反转</button>
    <button onclick="shuffleArray()">打乱</button>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">添加/删除方法</h2>
    <div class="method-grid">
      <div class="method-btn" onclick="demoPush()">push()</div>
      <div class="method-btn" onclick="demoPop()">pop()</div>
      <div class="method-btn" onclick="demoUnshift()">unshift()</div>
      <div class="method-btn" onclick="demoShift()">shift()</div>
      <div class="method-btn" onclick="demoSplice()">splice()</div>
      <div class="method-btn" onclick="demoSlice()">slice()</div>
    </div>
    <div class="output" id="addRemoveOutput">点击方法查看效果</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">遍历方法</h2>
    <div class="method-grid">
      <div class="method-btn" onclick="demoForEach()">forEach()</div>
      <div class="method-btn" onclick="demoMap()">map()</div>
      <div class="method-btn" onclick="demoFilter()">filter()</div>
      <div class="method-btn" onclick="demoReduce()">reduce()</div>
      <div class="method-btn" onclick="demoFind()">find()</div>
      <div class="method-btn" onclick="demoSomeEvery()">some/every()</div>
    </div>
    <div class="output" id="iterateOutput">点击方法查看效果</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">购物车示例</h2>
    <table>
      <thead>
        <tr>
          <th>商品</th>
          <th>单价</th>
          <th>数量</th>
          <th>小计</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>
    <div class="cart-total" id="cartTotal">总计：¥0.00</div>
    <button class="btn-add" onclick="addProduct()">添加商品</button>
  </div>

  <script>
    let currentArray = [3, 1, 4, 1, 5, 9, 2, 6];

    function renderArray() {
      const container = document.getElementById('arrayVisual');
      container.innerHTML = '';
      currentArray.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'array-item';
        div.textContent = item;
        div.onclick = () => {
          document.querySelectorAll('.array-item').forEach(d => d.classList.remove('highlight'));
          div.classList.add('highlight');
        };
        container.appendChild(div);
      });
    }

    function randomArray() {
      currentArray = Array.from({ length: 8 }, () => Math.floor(Math.random() * 100));
      renderArray();
    }

    function sortArray() {
      currentArray.sort((a, b) => a - b);
      renderArray();
    }

    function reverseArray() {
      currentArray.reverse();
      renderArray();
    }

    function shuffleArray() {
      for (let i = currentArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentArray[i], currentArray[j]] = [currentArray[j], currentArray[i]];
      }
      renderArray();
    }

    function demoPush() {
      const arr = [1, 2, 3];
      const result = arr.push(4);
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3]\npush(4) 后: ${JSON.stringify(arr)}\n返回值: ${result} (新长度)`;
    }

    function demoPop() {
      const arr = [1, 2, 3];
      const result = arr.pop();
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3]\npop() 后: ${JSON.stringify(arr)}\n返回值: ${result} (被删除元素)`;
    }

    function demoUnshift() {
      const arr = [1, 2, 3];
      const result = arr.unshift(0);
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3]\nunshift(0) 后: ${JSON.stringify(arr)}\n返回值: ${result} (新长度)`;
    }

    function demoShift() {
      const arr = [1, 2, 3];
      const result = arr.shift();
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3]\nshift() 后: ${JSON.stringify(arr)}\n返回值: ${result} (被删除元素)`;
    }

    function demoSplice() {
      const arr = [1, 2, 3, 4, 5];
      const result = arr.splice(2, 1, 'a', 'b');
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3, 4, 5]\nsplice(2, 1, 'a', 'b') 后:\n${JSON.stringify(arr)}\n返回值: ${JSON.stringify(result)} (被删除元素)`;
    }

    function demoSlice() {
      const arr = [1, 2, 3, 4, 5];
      const result = arr.slice(1, 4);
      document.getElementById('addRemoveOutput').textContent = 
        `原数组: [1, 2, 3, 4, 5]\nslice(1, 4) 结果:\n${JSON.stringify(result)}\n原数组不变: ${JSON.stringify(arr)}`;
    }

    function demoForEach() {
      const arr = [1, 2, 3];
      let result = 'forEach 遍历:\n';
      arr.forEach((n, i) => result += `  arr[${i}] = ${n}\n`);
      document.getElementById('iterateOutput').textContent = result;
    }

    function demoMap() {
      const arr = [1, 2, 3];
      const result = arr.map(n => n * 2);
      document.getElementById('iterateOutput').textContent = 
        `原数组: ${JSON.stringify(arr)}\nmap(n => n * 2) 结果:\n${JSON.stringify(result)}`;
    }

    function demoFilter() {
      const arr = [1, 2, 3, 4, 5];
      const result = arr.filter(n => n % 2 === 0);
      document.getElementById('iterateOutput').textContent = 
        `原数组: ${JSON.stringify(arr)}\nfilter(n => n % 2 === 0) 结果:\n${JSON.stringify(result)}`;
    }

    function demoReduce() {
      const arr = [1, 2, 3, 4, 5];
      const result = arr.reduce((sum, n) => sum + n, 0);
      document.getElementById('iterateOutput').textContent = 
        `原数组: ${JSON.stringify(arr)}\nreduce((sum, n) => sum + n, 0) 结果:\n${result}`;
    }

    function demoFind() {
      const arr = [1, 2, 3, 4, 5];
      const result = arr.find(n => n > 3);
      document.getElementById('iterateOutput').textContent = 
        `原数组: ${JSON.stringify(arr)}\nfind(n => n > 3) 结果:\n${result}`;
    }

    function demoSomeEvery() {
      const arr = [1, 2, 3, 4, 5];
      const someResult = arr.some(n => n > 3);
      const everyResult = arr.every(n => n > 0);
      document.getElementById('iterateOutput').textContent = 
        `原数组: ${JSON.stringify(arr)}\nsome(n => n > 3): ${someResult}\nevery(n => n > 0): ${everyResult}`;
    }

    const ShoppingCart = {
      items: [],
      
      add(product) {
        const existing = this.items.find(item => item.id === product.id);
        if (existing) {
          existing.quantity++;
        } else {
          this.items.push({ ...product, quantity: 1 });
        }
      },
      
      remove(id) {
        this.items = this.items.filter(item => item.id !== id);
      },
      
      updateQuantity(id, quantity) {
        const item = this.items.find(item => item.id === id);
        if (item) {
          item.quantity = Math.max(0, quantity);
          if (item.quantity === 0) this.remove(id);
        }
      },
      
      getTotal() {
        return this.items.reduce((total, item) => total + item.price * item.quantity, 0);
      }
    };

    const products = [
      { id: 1, name: '苹果', price: 5.5 },
      { id: 2, name: '香蕉', price: 3.0 },
      { id: 3, name: '橙子', price: 4.5 },
      { id: 4, name: '葡萄', price: 8.0 },
      { id: 5, name: '西瓜', price: 2.5 }
    ];

    function renderCart() {
      const tbody = document.getElementById('cartBody');
      tbody.innerHTML = '';
      
      ShoppingCart.items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.name}</td>
          <td>¥${item.price.toFixed(2)}</td>
          <td>
            <button class="btn-qty" onclick="updateQty(${item.id}, ${item.quantity - 1})">-</button>
            ${item.quantity}
            <button class="btn-qty" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
          </td>
          <td>¥${(item.price * item.quantity).toFixed(2)}</td>
          <td><button class="btn-remove" onclick="removeItem(${item.id})">删除</button></td>
        `;
        tbody.appendChild(tr);
      });
      
      document.getElementById('cartTotal').textContent = 
        `总计：¥${ShoppingCart.getTotal().toFixed(2)}`;
    }

    function addProduct() {
      const product = products[Math.floor(Math.random() * products.length)];
      ShoppingCart.add(product);
      renderCart();
    }

    function removeItem(id) {
      ShoppingCart.remove(id);
      renderCart();
    }

    function updateQty(id, qty) {
      ShoppingCart.updateQuantity(id, qty);
      renderCart();
    }

    renderArray();
    ShoppingCart.add(products[0]);
    ShoppingCart.add(products[1]);
    ShoppingCart.add(products[0]);
    renderCart();
  </script>
</body>
</html>
