<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM 操作演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      background: #f5f5f5;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
    .demo-section {
      margin: 30px 0;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .demo-title {
      font-size: 24px;
      color: #f7df1e;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f7df1e;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s;
      background: #f7df1e;
      color: #000;
    }
    button:hover { background: #e5ce1b; }
    .output {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }
    .input-group { margin: 10px 0; }
    .input-group input {
      padding: 10px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 5px;
      width: 200px;
    }
    .input-group input:focus { border-color: #f7df1e; outline: none; }
    #styleDemo {
      padding: 20px;
      background: #3498db;
      color: white;
      border-radius: 8px;
      margin: 20px 0;
      transition: all 0.3s;
    }
    .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
    .tab {
      padding: 10px 20px;
      background: #e0e0e0;
      border: none;
      border-radius: 5px 5px 0 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab.active { background: #667eea; color: white; }
    .tab-content {
      display: none;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 0 5px 5px 5px;
    }
    .tab-content.active { display: block; }
    #todoList { list-style: none; }
    #todoList li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f8f9fa;
      margin: 5px 0;
      border-radius: 5px;
    }
    #todoList li.done span { text-decoration: line-through; color: #999; }
    #todoList li span { flex: 1; }
    .btn-small { padding: 5px 10px; font-size: 12px; }
    .btn-done { background: #27ae60; color: white; }
    .btn-delete { background: #e74c3c; color: white; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
    }
    .modal h3 { margin-bottom: 15px; }
    .modal p { margin-bottom: 20px; color: #666; }
  </style>
</head>
<body>
  <h1>DOM 操作演示</h1>
  
  <div class="demo-section">
    <h2 class="demo-title">获取元素</h2>
    <div class="input-group">
      <input type="text" id="selectorInput" placeholder="输入选择器" value="#styleDemo">
    </div>
    <button onclick="queryElement()">查询元素</button>
    <div class="output" id="queryOutput">输入选择器后点击查询</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">修改样式</h2>
    <div id="styleDemo">这是一个样式演示元素</div>
    <button onclick="changeColor()">改变颜色</button>
    <button onclick="changeSize()">改变大小</button>
    <button onclick="toggleClass()">切换类</button>
    <button onclick="resetStyle()">重置样式</button>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">标签页组件</h2>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">首页</button>
      <button class="tab" onclick="switchTab(1)">产品</button>
      <button class="tab" onclick="switchTab(2)">关于</button>
    </div>
    <div class="tab-content active" id="tab0">
      <h3>首页内容</h3>
      <p>这是首页的内容区域。</p>
    </div>
    <div class="tab-content" id="tab1">
      <h3>产品内容</h3>
      <p>这是产品的内容区域。</p>
    </div>
    <div class="tab-content" id="tab2">
      <h3>关于内容</h3>
      <p>这是关于的内容区域。</p>
    </div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">待办事项列表</h2>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="输入待办事项">
      <button onclick="addTodo()">添加</button>
    </div>
    <ul id="todoList"></ul>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">模态框</h2>
    <button onclick="openModal()">打开模态框</button>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <h3>模态框标题</h3>
      <p>这是一个模态框组件，点击遮罩或关闭按钮可以关闭。</p>
      <button onclick="closeModal()">关闭</button>
    </div>
  </div>

  <script>
    function queryElement() {
      const selector = document.getElementById('selectorInput').value;
      try {
        const el = document.querySelector(selector);
        if (el) {
          const info = {
            tagName: el.tagName,
            id: el.id,
            className: el.className,
            textContent: el.textContent.substring(0, 50) + '...',
            childElementCount: el.childElementCount
          };
          document.getElementById('queryOutput').textContent = 
            `找到元素:\n${JSON.stringify(info, null, 2)}`;
        } else {
          document.getElementById('queryOutput').textContent = '未找到元素';
        }
      } catch (e) {
        document.getElementById('queryOutput').textContent = `选择器错误: ${e.message}`;
      }
    }

    const colors = ['#3498db', '#e74c3c', '#27ae60', '#9b59b6', '#f39c12'];
    let colorIndex = 0;
    let sizeNormal = true;

    function changeColor() {
      const el = document.getElementById('styleDemo');
      colorIndex = (colorIndex + 1) % colors.length;
      el.style.backgroundColor = colors[colorIndex];
    }

    function changeSize() {
      const el = document.getElementById('styleDemo');
      sizeNormal = !sizeNormal;
      el.style.fontSize = sizeNormal ? '16px' : '24px';
      el.style.padding = sizeNormal ? '20px' : '30px';
    }

    function toggleClass() {
      const el = document.getElementById('styleDemo');
      el.classList.toggle('highlight');
    }

    function resetStyle() {
      const el = document.getElementById('styleDemo');
      el.style = '';
      el.className = '';
      colorIndex = 0;
      sizeNormal = true;
    }

    function switchTab(index) {
      document.querySelectorAll('.tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.tab-content').forEach((content, i) => {
        content.classList.toggle('active', i === index);
      });
    }

    const TodoList = {
      items: [],
      
      render() {
        const ul = document.getElementById('todoList');
        ul.innerHTML = '';
        
        this.items.forEach((item, index) => {
          const li = document.createElement('li');
          if (item.done) li.classList.add('done');
          
          const span = document.createElement('span');
          span.textContent = item.text;
          
          const doneBtn = document.createElement('button');
          doneBtn.className = 'btn-small btn-done';
          doneBtn.textContent = item.done ? '撤销' : '完成';
          doneBtn.onclick = () => this.toggle(index);
          
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn-small btn-delete';
          deleteBtn.textContent = '删除';
          deleteBtn.onclick = () => this.remove(index);
          
          li.appendChild(span);
          li.appendChild(doneBtn);
          li.appendChild(deleteBtn);
          ul.appendChild(li);
        });
      },
      
      add(text) {
        if (!text.trim()) return;
        this.items.push({ text, done: false });
        this.render();
      },
      
      toggle(index) {
        this.items[index].done = !this.items[index].done;
        this.render();
      },
      
      remove(index) {
        this.items.splice(index, 1);
        this.render();
      }
    };

    function addTodo() {
      const input = document.getElementById('todoInput');
      TodoList.add(input.value);
      input.value = '';
    }

    document.getElementById('todoInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    function openModal() {
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function closeModalOnOverlay(e) {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    TodoList.items = [
      { text: '学习 DOM 操作', done: true },
      { text: '练习事件处理', done: false },
      { text: '完成项目实战', done: false }
    ];
    TodoList.render();
  </script>
</body>
</html>
