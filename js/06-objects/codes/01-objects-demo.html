<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对象演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      background: #f5f5f5;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
    .demo-section {
      margin: 30px 0;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .demo-title {
      font-size: 24px;
      color: #f7df1e;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f7df1e;
    }
    .code-block {
      background: #282c34;
      color: #abb2bf;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      overflow-x: auto;
      margin: 15px 0;
      line-height: 1.6;
    }
    .keyword { color: #c678dd; }
    .string { color: #98c379; }
    .number { color: #d19a66; }
    .comment { color: #5c6370; font-style: italic; }
    button {
      padding: 10px 20px;
      font-size: 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s;
      background: #f7df1e;
      color: #000;
    }
    button:hover { background: #e5ce1b; }
    .output {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .user-card {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      margin: 10px;
      min-width: 200px;
    }
    .user-card h3 { margin-bottom: 10px; }
    .user-card p { margin: 5px 0; font-size: 14px; }
    .user-list { display: flex; flex-wrap: wrap; margin: 20px 0; }
    .input-group { margin: 10px 0; }
    .input-group input {
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 5px;
      width: 150px;
    }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; font-weight: 600; }
    .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; }
    .btn-edit { background: #3498db; color: white; padding: 5px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>对象演示</h1>
  
  <div class="demo-section">
    <h2 class="demo-title">对象创建与访问</h2>
    <div class="code-block">
      <span class="keyword">const</span> user = {<br>
      &nbsp;&nbsp;name: <span class="string">'张三'</span>,<br>
      &nbsp;&nbsp;age: <span class="number">25</span>,<br>
      &nbsp;&nbsp;city: <span class="string">'北京'</span>,<br>
      &nbsp;&nbsp;greet() { <span class="keyword">return</span> <span class="string">`你好，我是${this.name}`</span>; }<br>
      };<br><br>
      user.name      <span class="comment">// 点表示法</span><br>
      user[<span class="string">'age'</span>]   <span class="comment">// 方括号表示法</span>
    </div>
    <button onclick="testAccess()">测试访问</button>
    <div class="output" id="accessOutput">点击按钮测试</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">对象解构</h2>
    <div class="code-block">
      <span class="keyword">const</span> { name, age, city = <span class="string">'未知'</span> } = user;
    </div>
    <button onclick="testDestructure()">测试解构</button>
    <div class="output" id="destructOutput">点击按钮测试</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">对象方法</h2>
    <button onclick="testObjectKeys()">Object.keys()</button>
    <button onclick="testObjectValues()">Object.values()</button>
    <button onclick="testObjectEntries()">Object.entries()</button>
    <button onclick="testObjectAssign()">Object.assign()</button>
    <div class="output" id="methodOutput">点击按钮测试</div>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">用户管理系统</h2>
    <div class="input-group">
      <input type="text" id="userName" placeholder="姓名">
      <input type="number" id="userAge" placeholder="年龄">
      <input type="text" id="userCity" placeholder="城市">
      <button onclick="addUser()">添加用户</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>姓名</th>
          <th>年龄</th>
          <th>城市</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>

  <div class="demo-section">
    <h2 class="demo-title">对象冻结与密封</h2>
    <button onclick="testFreeze()">Object.freeze()</button>
    <button onclick="testSeal()">Object.seal()</button>
    <div class="output" id="freezeOutput">点击按钮测试</div>
  </div>

  <script>
    const user = {
      name: '张三',
      age: 25,
      city: '北京',
      greet() { return `你好，我是${this.name}`; }
    };

    function testAccess() {
      let result = '';
      result += `user.name: ${user.name}\n`;
      result += `user['age']: ${user['age']}\n`;
      result += `user.greet(): ${user.greet()}\n`;
      result += `'city' in user: ${'city' in user}\n`;
      result += `user.hasOwnProperty('name'): ${user.hasOwnProperty('name')}`;
      document.getElementById('accessOutput').textContent = result;
    }

    function testDestructure() {
      const { name, age, city = '未知', country = '中国' } = user;
      let result = '';
      result += `解构结果:\n`;
      result += `name: ${name}\n`;
      result += `age: ${age}\n`;
      result += `city: ${city}\n`;
      result += `country (默认值): ${country}`;
      document.getElementById('destructOutput').textContent = result;
    }

    function testObjectKeys() {
      document.getElementById('methodOutput').textContent = 
        `Object.keys(user):\n${JSON.stringify(Object.keys(user), null, 2)}`;
    }

    function testObjectValues() {
      document.getElementById('methodOutput').textContent = 
        `Object.values(user):\n${JSON.stringify(Object.values(user), null, 2)}`;
    }

    function testObjectEntries() {
      document.getElementById('methodOutput').textContent = 
        `Object.entries(user):\n${JSON.stringify(Object.entries(user), null, 2)}`;
    }

    function testObjectAssign() {
      const merged = Object.assign({}, user, { email: 'test@example.com' });
      document.getElementById('methodOutput').textContent = 
        `Object.assign({}, user, {email}):\n${JSON.stringify(merged, null, 2)}`;
    }

    const UserManager = {
      users: [],
      
      add(user) {
        this.users.push({ ...user, id: Date.now() });
        return this;
      },
      
      findById(id) {
        return this.users.find(u => u.id === id);
      },
      
      remove(id) {
        this.users = this.users.filter(u => u.id !== id);
        return this;
      },
      
      update(id, data) {
        const index = this.users.findIndex(u => u.id === id);
        if (index !== -1) {
          this.users[index] = { ...this.users[index], ...data };
        }
        return this;
      },
      
      list() {
        return [...this.users];
      }
    };

    function renderUsers() {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      UserManager.list().forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.id}</td>
          <td>${u.name}</td>
          <td>${u.age}</td>
          <td>${u.city || '-'}</td>
          <td>
            <button class="btn-edit" onclick="editUser(${u.id})">编辑</button>
            <button class="btn-delete" onclick="deleteUser(${u.id})">删除</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function addUser() {
      const name = document.getElementById('userName').value;
      const age = document.getElementById('userAge').value;
      const city = document.getElementById('userCity').value;
      
      if (!name) return alert('请输入姓名');
      
      UserManager.add({ name, age: parseInt(age), city });
      renderUsers();
      
      document.getElementById('userName').value = '';
      document.getElementById('userAge').value = '';
      document.getElementById('userCity').value = '';
    }

    function deleteUser(id) {
      UserManager.remove(id);
      renderUsers();
    }

    function editUser(id) {
      const user = UserManager.findById(id);
      const newName = prompt('新姓名:', user.name);
      if (newName) {
        UserManager.update(id, { name: newName });
        renderUsers();
      }
    }

    function testFreeze() {
      const frozen = { name: '张三' };
      Object.freeze(frozen);
      
      let result = 'Object.freeze() 后:\n';
      result += `尝试修改 name = '李四'\n`;
      frozen.name = '李四';
      result += `结果: name = ${frozen.name}\n`;
      result += `尝试添加 age = 25\n`;
      frozen.age = 25;
      result += `结果: age = ${frozen.age || '未添加'}\n`;
      result += `\n解释: freeze 后对象完全不可修改`;
      document.getElementById('freezeOutput').textContent = result;
    }

    function testSeal() {
      const sealed = { name: '张三' };
      Object.seal(sealed);
      
      let result = 'Object.seal() 后:\n';
      result += `尝试修改 name = '李四'\n`;
      sealed.name = '李四';
      result += `结果: name = ${sealed.name} (可修改)\n`;
      result += `尝试添加 age = 25\n`;
      sealed.age = 25;
      result += `结果: age = ${sealed.age || '未添加'}\n`;
      result += `\n解释: seal 后可修改现有属性，但不能添加/删除`;
      document.getElementById('freezeOutput').textContent = result;
    }

    UserManager.add({ name: '张三', age: 25, city: '北京' });
    UserManager.add({ name: '李四', age: 30, city: '上海' });
    renderUsers();
  </script>
</body>
</html>
