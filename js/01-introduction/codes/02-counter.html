<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计数器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }
    .counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: #667eea;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #764ba2;
      transform: scale(1.1);
    }
    .btn:active {
      transform: scale(0.95);
    }
    .count {
      font-size: 48px;
      font-weight: bold;
      color: #2c3e50;
      min-width: 100px;
    }
    .reset-btn {
      padding: 10px 30px;
      border: none;
      border-radius: 25px;
      background: #e74c3c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .reset-btn:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    .history {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>计数器</h1>
    <div class="counter">
      <button id="decreaseBtn" class="btn">-</button>
      <span id="count" class="count">0</span>
      <button id="increaseBtn" class="btn">+</button>
    </div>
    <button id="resetBtn" class="reset-btn">重置</button>
    <div class="history" id="history">操作历史：无</div>
  </div>

  <script>
    let count = 0;
    const history = [];

    const countElement = document.getElementById('count');
    const increaseBtn = document.getElementById('increaseBtn');
    const decreaseBtn = document.getElementById('decreaseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const historyElement = document.getElementById('history');

    function updateDisplay() {
      countElement.textContent = count;
      
      if (count > 0) {
        countElement.style.color = '#27ae60';
      } else if (count < 0) {
        countElement.style.color = '#e74c3c';
      } else {
        countElement.style.color = '#2c3e50';
      }
    }

    function addHistory(action) {
      const time = new Date().toLocaleTimeString();
      history.push(`${time}: ${action}`);
      if (history.length > 5) {
        history.shift();
      }
      historyElement.textContent = '操作历史：' + history.join(' | ');
    }

    increaseBtn.addEventListener('click', function() {
      count++;
      updateDisplay();
      addHistory(`+1 → ${count}`);
    });

    decreaseBtn.addEventListener('click', function() {
      count--;
      updateDisplay();
      addHistory(`-1 → ${count}`);
    });

    resetBtn.addEventListener('click', function() {
      count = 0;
      updateDisplay();
      addHistory('重置 → 0');
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp' || e.key === '+') {
        count++;
        updateDisplay();
        addHistory(`+1 → ${count}`);
      } else if (e.key === 'ArrowDown' || e.key === '-') {
        count--;
        updateDisplay();
        addHistory(`-1 → ${count}`);
      } else if (e.key === 'r' || e.key === 'R') {
        count = 0;
        updateDisplay();
        addHistory('重置 → 0');
      }
    });
  </script>
</body>
</html>
